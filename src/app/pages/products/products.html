<h2>Products</h2>

<div class="product-grid">
  <div class="card" *ngFor="let product of products">
    
    <img [src]="product.imageUrl" alt="product" />

    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>

    <div class="price">₹ {{ product.price }}</div>

    <button>Add to Cart</button>
  </div>
</div>
